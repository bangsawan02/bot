name: Bot Automation Workflows

on:
  repository_dispatch:
    types: [new_url_received]

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAYLOAD_URL: ${{ github.event.client_payload.url }}
      PAYLOAD_SENDER: ${{ github.event.client_payload.sender }}
      PAYLOAD_MODE: ${{ github.event.client_payload.mode }}
      BOT_TOKEN: ${{ github.event.client_payload.bot_token }}
      GOOGLE_CLIENT_ID: ${{ github.event.client_payload.client_id }}
      GOOGLE_CLIENT_SECRET: ${{ github.event.client_payload.client_secret }}
      DRIVE_REFRESH_TOKEN: ${{ github.event.client_payload.refresh_token }}
      OWNER_ID: ${{ github.event.client_payload.sender }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. RESTORE CACHE SECTION
      # =========================================================
      - name: Restore Node & Playwright Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-v1-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v1-

      - name: Restore Python Venv Cache
        uses: actions/cache/restore@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-v1-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-v1-

      # =========================================================
      # 2. INSTALLATION
      # =========================================================
      - name: Install Node Dependencies
        run: |
          npm install
          npx playwright install chromium 

      - name: Setup Python Venv & Install Deps
        run: |
          # Buat venv jika belum ada dari cache
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Default deps jika requirements.txt absen
            # pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib yt-dlp
          fi

      - name: Install System Tools (Aria2 & Tools)
        run: |
          #sudo DEBIAN_FRONTEND=noninteractive apt-get update
          #sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb aria2 ffmpeg
          if [[ "${{ env.PAYLOAD_URL }}" == *"mega.nz"* ]]; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends megatools
          fi

      # =========================================================
      # 3. EXECUTION
      # =========================================================
      - name: Run Node.js Downloader
        run: |
          sudo rm -f /tmp/.X99-lock
          sudo rm -f /tmp/.X11-unix/X99
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node main.js
        env:
          PAYLOAD_URL: ${{ env.PAYLOAD_URL }}
          BOT_TOKEN: ${{ env.BOT_TOKEN }}
          OWNER_ID: ${{ env.OWNER_ID }}

      - name: Get Downloaded Filename
        id: get_filename
        run: |
          if [ -f "downloaded_filename.txt" ]; then
            FILE_NAME=$(cat downloaded_filename.txt | tr -d '\n')
          else
            FILE_NAME=$(ls -p | grep -v / | grep -vE '\.(js|py|json|yaml|yml|txt|md|lock)$' | head -1)
          fi
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Upload logic
        if: steps.get_filename.outputs.file_name != ''
        run: |
          # Panggil python langsung dari venv agar env-nya terbaca
          if [[ "${{ env.PAYLOAD_MODE }}" == "telegram" ]]; then
            venv/bin/python telegram_upload.py
          else
            venv/bin/python upload.py
          fi
        env:
          FILENAME: ${{ steps.get_filename.outputs.file_name }}

      # =========================================================
      # 4. FORCE SAVE CACHE
      # =========================================================
      - name: Save Node & Playwright Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-v1-${{ hashFiles('package.json') }}

      - name: Save Python Venv Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-v1-${{ hashFiles('requirements.txt') }}
