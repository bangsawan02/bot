name: Bot Automation Workflows

on:
  repository_dispatch:
    types: [new_url_received]

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Ambil data dari payload trigger
      PAYLOAD_URL: ${{ github.event.client_payload.url }}
      PAYLOAD_SENDER: ${{ github.event.client_payload.sender }}
      PAYLOAD_MODE: ${{ github.event.client_payload.mode }}
      BOT_TOKEN: ${{ github.event.client_payload.bot_token }}
      GOOGLE_CLIENT_ID: ${{ github.event.client_payload.client_id }}
      GOOGLE_CLIENT_SECRET: ${{ github.event.client_payload.client_secret }}
      DRIVE_REFRESH_TOKEN: ${{ github.event.client_payload.refresh_token }}
      OWNER_ID: ${{ github.event.client_payload.sender }}
      # API Telegram (jika masih butuh untuk script python)
      API_ID: ${{ vars.API_ID }}
      API_HASH: ${{ vars.API_HASH }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. SETUP NODE.JS & PLAYWRIGHT
      # =========================================================
      

      - name: Install Node Dependencies
        run: |
          npm install playwright playwright-stealth axios fs-extra
          npx playwright install chromium --with-deps

      # =========================================================
      # 2. SETUP PYTHON (DEFAULT VERSION)
      # =========================================================
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Langsung install tanpa venv untuk kecepatan
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib
          fi

      # =========================================================
      # 3. SYSTEM DEPENDENCIES (XVFB & MEGATOOLS)
      # =========================================================
      - name: Install System Tools
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb
          if [[ "${{ env.PAYLOAD_URL }}" == *"mega.nz"* ]]; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends megatools
          fi

      # =========================================================
      # 4. EXECUTION (DOWNLOAD MENGGUNAKAN NODE.JS)
      # =========================================================
      - name: Run Node.js Downloader
        run: |
          sudo rm -f /tmp/.X99-lock
          sudo rm -f /tmp/.X11-unix/X99
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node main.js
        env:
          PAYLOAD_URL: ${{ env.PAYLOAD_URL }}
          BOT_TOKEN: ${{ env.BOT_TOKEN }}
          OWNER_ID: ${{ env.OWNER_ID }}

      # =========================================================
      # 5. IDENTIFIKASI FILE HASIL DOWNLOAD
      # =========================================================
      - name: Get Downloaded Filename
        id: get_filename
        run: |
          # Pastikan main.js lu nulis nama file ke 'downloaded_filename.txt'
          if [ -f "downloaded_filename.txt" ]; then
            FILE_NAME=$(cat downloaded_filename.txt | tr -d '\n')
          else
            # Jika txt tidak ada, ambil file terbaru di folder root (exclude .js, .py, .json)
            FILE_NAME=$(ls -p | grep -v / | grep -vE '\.(js|py|json|yaml|yml|txt|md)$' | head -1)
          fi
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "[*] Target File: $FILE_NAME"

      # =========================================================
      # 6. UPLOAD SECTION (MENGGUNAKAN PYTHON)
      # =========================================================
      - name: Upload to Telegram
        if: env.PAYLOAD_MODE == 'telegram'
        run: python telegram_upload.py
        env:
          FILENAME: ${{ steps.get_filename.outputs.file_name }}

      - name: Upload to Google Drive
        if: env.PAYLOAD_MODE == 'gdrive'
        run: python upload.py
        env:
          FILENAME: ${{ steps.get_filename.outputs.file_name }}
          DRIVE_REFRESH_TOKEN: ${{ env.DRIVE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ env.GOOGLE_CLIENT_SECRET }}

      # =========================================================
      # 7. CLEANUP
      # =========================================================
      - name: Cleanup Space
        if: always()
        run: |
          rm -rf node_modules
          # Hapus file besar setelah upload selesai
          if [ "${{ steps.get_filename.outputs.file_name }}" != "" ]; then
            rm -f "${{ steps.get_filename.outputs.file_name }}"
          fi
